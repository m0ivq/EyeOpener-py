<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>EyeOpener Adjustable Test</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
            font-size: 26px;
            padding-top: 60px;
        }

        button {
            font-size: 32px;
            padding: 18px 36px;
        }

        canvas {
            display: none;
        }
    </style>
</head>

<body>
    <h1>EyeOpener</h1>
    <p>Quest display page</p>
    <button id="enterVr">Enter VR</button>
    <canvas id="xrCanvas"></canvas>

    <script>
        const button = document.getElementById("enterVr");
        const canvas = document.getElementById("xrCanvas");

        const gl = canvas.getContext("webgl", {
            xrCompatible: true,
            antialias: false
        });

        let xrSession = null;
        let xrRefSpace = null;
        let program = null;
        let positionBuffer = null;

        let rightOffsetX = 0.0;
        let rightOffsetY = 0.0;
        let leftBrightness = 1.0;
        let rightBrightness = 1.0;

        const vertexShaderSource = `
      attribute vec2 a_position;
      uniform vec2 u_offset;

      void main() {
        gl_Position = vec4(a_position + u_offset, 0.0, 1.0);
      }
    `;

        const fragmentShaderSource = `
      precision mediump float;
      uniform vec4 u_color;

      void main() {
        gl_FragColor = u_color;
      }
    `;

        async function pollState() {
            try {
                const response = await fetch("/api/state", { cache: "no-store" });
                const state = await response.json();

                rightOffsetX = state.right_x;
                rightOffsetY = state.right_y;
                leftBrightness = state.left_brightness;
                rightBrightness = state.right_brightness;
            } catch (err) {
                console.log("State poll failed", err);
            }
        }

        setInterval(pollState, 100);

        function createShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                return null;
            }

            return shader;
        }

        function createProgram() {
            const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
            const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

            const p = gl.createProgram();
            gl.attachShader(p, vertexShader);
            gl.attachShader(p, fragmentShader);
            gl.linkProgram(p);

            if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
                console.error(gl.getProgramInfoLog(p));
                return null;
            }

            return p;
        }

        function initGL() {
            program = createProgram();

            const squareSize = 0.25;

            const vertices = new Float32Array([
                -squareSize, -squareSize,
                squareSize, -squareSize,
                -squareSize, squareSize,

                -squareSize, squareSize,
                squareSize, -squareSize,
                squareSize, squareSize
            ]);

            positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        }

        button.onclick = async () => {
            if (!navigator.xr) {
                alert("WebXR not available");
                return;
            }

            await pollState();

            initGL();

            xrSession = await navigator.xr.requestSession("immersive-vr");
            button.style.display = "none";

            const xrLayer = new XRWebGLLayer(xrSession, gl);
            xrSession.updateRenderState({ baseLayer: xrLayer });

            xrRefSpace = await xrSession.requestReferenceSpace("local");
            xrSession.requestAnimationFrame(onXRFrame);
        };

        function drawSquare(r, g, b, offsetX, offsetY) {
            gl.useProgram(program);

            const positionLocation = gl.getAttribLocation(program, "a_position");
            const colorLocation = gl.getUniformLocation(program, "u_color");
            const offsetLocation = gl.getUniformLocation(program, "u_offset");

            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            gl.uniform2f(offsetLocation, offsetX, offsetY);
            gl.uniform4f(colorLocation, r, g, b, 1.0);

            gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        function onXRFrame(time, frame) {
            const session = frame.session;
            session.requestAnimationFrame(onXRFrame);

            const pose = frame.getViewerPose(xrRefSpace);
            if (!pose) return;

            const layer = session.renderState.baseLayer;

            gl.bindFramebuffer(gl.FRAMEBUFFER, layer.framebuffer);
            gl.enable(gl.SCISSOR_TEST);

            for (const view of pose.views) {
                const viewport = layer.getViewport(view);

                gl.viewport(viewport.x, viewport.y, viewport.width, viewport.height);
                gl.scissor(viewport.x, viewport.y, viewport.width, viewport.height);

                gl.clearColor(0.0, 0.0, 0.0, 1.0);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

                if (view.eye === "left") {
                    drawSquare(leftBrightness, 0.0, 0.0, 0.0, 0.0);
                } else if (view.eye === "right") {
                    drawSquare(0.0, 0.0, rightBrightness, rightOffsetX, rightOffsetY);
                }
            }
        }
    </script>
</body>

</html>
